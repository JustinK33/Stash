name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test-package:
    name: Build, test, and package macOS app
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./cmd/stash

      - name: Test
        run: go test ./...

      - name: Package downloadable app
        run: bash scripts/package-macos.sh build/Stash.app Stash-macOS.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stash-macOS
          path: Stash-macOS.zip
